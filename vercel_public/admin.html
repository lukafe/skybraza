<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Admin — CertiK VASP Scoping</title>
    <link rel="icon" href="/static/img/favicon.svg?v=1" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/admin.css?v=4" />
  </head>
  <body>
    <header class="admin-header">
      <div class="wrap">
        <a class="admin-brand" href="/admin">CertiK<span>Admin</span></a>
        <nav class="admin-nav">
          <span id="user-email" class="hidden" style="color:var(--text-muted);font-size:.85rem"></span>
          <a href="/" id="link-app">Questionário</a>
          <a href="#" id="btn-simulate" class="hidden">Simulação</a>
          <a href="#" id="btn-changelog" class="hidden">Versões</a>
          <a href="#" id="btn-audit" class="hidden">Audit Log</a>
          <a href="#" id="btn-logout" class="hidden">Sair</a>
        </nav>
      </div>
    </header>

    <!-- Login -->
    <div id="view-login" class="login-wrap">
      <div class="login-card">
        <h1>Painel administrativo</h1>
        <p class="login-sub" id="login-sub">Faça login para aceder ao painel.</p>
        <div id="google-signin-btn" class="hidden" style="display:flex;justify-content:center;margin:1.25rem 0 0.5rem"></div>
        <form id="password-form" class="hidden" autocomplete="off">
          <input type="password" id="password-input" class="login-input" placeholder="Senha de administrador" required />
          <button type="submit" class="login-btn">Entrar</button>
        </form>
        <p id="login-error" class="login-error"></p>
      </div>
    </div>

    <!-- Dashboard -->
    <div id="view-dashboard" class="main-content wrap hidden">
      <div id="stats-row" class="stats-row"></div>
      <div class="toolbar">
        <input type="search" id="search-input" class="toolbar-search" placeholder="Pesquisar por instituição…" autocomplete="off" />
        <select id="filter-track" class="toolbar-select">
          <option value="">Todas as trilhas</option>
          <option value="intermediaria">Intermediária</option>
          <option value="custodiante">Custodiante</option>
          <option value="corretora">Corretora</option>
        </select>
        <input type="date" id="filter-date-from" class="toolbar-date" title="Data inicial" />
        <input type="date" id="filter-date-to" class="toolbar-date" title="Data final" />
        <button type="button" id="btn-export-csv" class="toolbar-btn" title="Exportar CSV">⬇ CSV</button>
      </div>
      <div id="table-wrap"></div>
      <div id="pagination" class="pagination hidden"></div>
    </div>

    <!-- Detail -->
    <div id="view-detail" class="main-content wrap hidden"></div>

    <!-- Simulate -->
    <div id="view-simulate" class="main-content wrap hidden">
      <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem">
        <button class="detail-back" id="btn-sim-back">← Voltar</button>
        <h2 style="margin:0;font-size:1.1rem">Modo Simulação</h2>
      </div>
      <p class="text-muted" style="font-size:.85rem;margin-bottom:1rem">Execute o motor de regras sem persistir dados. Selecione trilha, responda perguntas e veja o resultado.</p>
      <div class="sim-controls">
        <div class="sim-row">
          <label>Instituição (opcional)</label>
          <input type="text" id="sim-institution" class="login-input" placeholder="Nome fictício">
        </div>
        <div class="sim-row">
          <label>Trilha</label>
          <select id="sim-track" class="login-input">
            <option value="intermediaria">Intermediária</option>
            <option value="avancada">Avançada</option>
          </select>
        </div>
      </div>
      <div id="sim-questions" style="margin:1rem 0"></div>
      <button class="compare-btn" id="btn-sim-run" style="margin-top:.5rem">▶ Executar simulação</button>
      <div id="sim-result" style="margin-top:1.5rem"></div>
    </div>

    <!-- Changelog -->
    <div id="view-changelog" class="main-content wrap hidden">
      <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem">
        <button class="detail-back" id="btn-changelog-back">← Voltar</button>
        <h2 style="margin:0;font-size:1.1rem">Versões da Matriz Regulatória</h2>
      </div>
      <div id="changelog-content"></div>
    </div>

    <!-- Audit Log -->
    <div id="view-audit" class="main-content wrap hidden">
      <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem">
        <button class="detail-back" id="btn-audit-back">← Voltar</button>
        <h2 style="margin:0;font-size:1.1rem">Audit Log</h2>
      </div>
      <div id="audit-table-wrap"></div>
    </div>

    <script src="/static/js/admin.js?v=4" type="module"></script>
  </body>
</html>
