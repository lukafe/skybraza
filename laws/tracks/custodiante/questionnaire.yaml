# Questionário — trilha CUSTODIANTE (IN 701)
# IDs com prefixo cust_ para não colidir com a trilha intermediária no mesmo runtime (Fase 2+).
# Cada add_incisos / when_true deve existir em laws/tracks/custodiante/COVERAGE_MATRIX.yaml (incisos[].id)

version: 1
track: custodiante
schema_version_questionnaire: 2

blocks:
  - id: diag
    title: "Diagnóstico — serviços técnicos CertiK (Jornada 2)"
    lead: >
      Estas perguntas não alteram o escopo IN 701; preparam a Jornada 2 (smart contract audit, pentest,
      checklist de evidências). Adequado também a custodiantes com contratos ou integrações on-chain.
  - id: A
    title: "Guarda, segregação e trânsito de ativos"
    lead: "Chaves, omnibus, prova de reservas e contas fiduciárias do cliente."
  - id: B
    title: "Terceiros, infraestrutura e subcustódia"
    lead: "Nuvem, fornecedores no exterior, subcustodiantes e serviços críticos."
  - id: C
    title: "Universo de ativos, produtos e integrações"
    lead: "Listagem ao cliente, stablecoins, staking e conexões com IF/pagamentos."
  - id: D
    title: "Narrativa e transparência operacional"
    lead: "Fluxo ponta a ponta e compromissos públicos de reservas."
  - id: E
    title: "Custodiante — governança, continuidade e prova operacional"
    lead: >
      Modalidade custódia (Res. 520 arts. 8º–9º; Cap. X). Perguntas de maturidade para relatório;
      em geral não alteram incisos (núcleo já obrigatório na trilha). Paridade de fluxo com a trilha corretora.

questions:
  # ---------- Bloco diag ----------
  - id: cust_diag_sc
    block: diag
    order: 1
    type: yes_no
    text: >
      A instituição desenvolve, faz deploy ou contrata smart contracts próprios em produção
      (vaults de custódia on-chain, lógica de permissões, bridges ou protocolos sob sua responsabilidade)?
    justificativa: >
      Jornada 2 — possível trilha de smart contract audit. Não altera incisos.
    tags: [jornada2, smart_contract]
    audit_only: true
    when_true: []
    when_false: []

  - id: cust_diag_surface
    block: diag
    order: 2
    type: yes_no
    text: >
      A instituição opera sistemas próprios expostos à internet (portal de cliente, API de custódia,
      painel administrativo, webhooks) para clientes ou parceiros?
    justificativa: >
      Jornada 2 — superfície para pentest. Não altera incisos.
    tags: [jornada2, pentest]
    audit_only: true
    when_true: []
    when_false: []

  # ---------- Bloco A ----------
  - id: cust_A_transit
    block: A
    order: 10
    type: yes_no
    text: >
      Além da guarda estática, os ativos dos clientes passam por carteiras de trânsito ou omnibus
      sob controlo da instituição (ou de subcustodiante agindo em seu nome) antes do destino final?
    justificativa: >
      Reforça segregação e prova de reservas em movimento (I_a, I_b); XV já correlaciona a deveres do custodiante.
    tags: [transito, segregacao]
    when_true: [I_a, I_b, XV]
    when_false: []

  - id: cust_A_fiat
    block: A
    order: 20
    type: yes_no
    text: >
      A instituição mantém contas de pagamento ou saldo em moeda fiduciária (ex.: BRL) em nome do cliente
      vinculado à operação de custódia de ativos virtuais (pré-conversão, saque fiat, ou conta reserva)?
    justificativa: >
      Aciona condições dos arts. 69 e 85 da Res. 520 (inciso X (b) (ii)).
    tags: [fiat, pagamento]
    when_true: [X_b_ii]
    when_false: []

  - id: cust_A_model
    block: A
    order: 30
    type: single_choice
    text: >
      Qual modelo descreve melhor quem pode iniciar ou autorizar movimentações on-chain dos ativos custodiados
      na prática predominante?
    justificativa: >
      Qualifica subcustódia e terceirização. VII–XVII já são obrigatórios na trilha custodiante; MPC implica
      terceiros com papéis de controlo — aciona III (diligência) além de II (já obrigatório na matriz).
    tags: [custodia, modelo]
    options:
      - id: inst_operates
        label: "A instituição ou operador designado movimenta em nome do cliente (hot, cold rotacionada, políticas internas)."
        add_incisos: []
      - id: mpc_mixed
        label: "MPC ou multipartição: a instituição e terceiros detêm fragmentos ou papéis de controlo."
        add_incisos: [II, III]
      - id: full_subcustody
        label: "Subcustódia integral por terceiro contratado (a instituição não detém chaves sozinha, mas responde perante o cliente)."
        add_incisos: [II, III]

  # ---------- Bloco B ----------
  - id: cust_B_exterior
    block: B
    order: 10
    type: yes_no
    text: >
      Fornecedores relevantes (subcustódia, nuvem, pagamentos, processamento) incluem entidade sediada no exterior
      ou sem autorização direta do Banco Central do Brasil para atividade equivalente no País?
    justificativa: >
      Terceirização com exposição internacional; arts. 32–33, 83 e continuidade (II, III, IV).
    tags: [terceiros, exterior]
    when_true: [II, III, IV]
    when_false: []

  - id: cust_B_cloud
    block: B
    order: 20
    type: yes_no
    text: >
      Ledger de saldos, cofre de chaves, HSM, ou sistemas críticos de custódia residem em nuvem ou datacenter
      de terceiro, com contrato alinhado às exigências do BCB?
    justificativa: >
      Outsourcing de tecnologia e continuidade (II, IV).
    tags: [nuvem, dados]
    when_true: [II, IV]
    when_false: []

  - id: cust_B_more_foreign
    block: B
    order: 30
    type: yes_no
    text: >
      Existem outros parceiros estrangeiros ou não autorizados pelo BCB em papéis relevantes além dos já cobertos
      (ex.: KYC como serviço crítico, mensageria de assinaturas)?
    justificativa: >
      Reforça diligência sobre prestador no exterior (art. 83) — III.
    tags: [terceiros, exterior]
    when_true: [III]
    when_false: []

  - id: cust_B_tp
    block: B
    order: 40
    type: multi_choice
    text: "Selecione terceiros materialmente relevantes na operação de custódia:"
    justificativa: >
      Mapa de outsourcing; opções somam incisos já obrigatórios ou condicionais conforme caso.
    tags: [terceiros, mapa]
    options:
      - id: subcustody
        label: "Subcustodiante de criptoativos (cold, MPC, institucional)"
        add_incisos: [II, III]
      - id: cloud_infra
        label: "Nuvem / hospedagem de sistemas críticos de custódia"
        add_incisos: [II, IV]
      - id: fiat_bank
        label: "Instituição de pagamento ou banco para fiat (Pix, TED, contas)"
        add_incisos: [II, V]
      - id: kyc_vendor
        label: "Fornecedor externo de KYC / PLD como serviço crítico"
        add_incisos: [II, VI_a]

  # ---------- Bloco C ----------
  - id: cust_C_stable
    block: C
    order: 10
    type: yes_no
    text: >
      A custódia inclui ativos com paridade ou referência explícita a moeda fiduciária (stablecoins,
      tokenizado lastreado, etc.) expostos ao cliente?
    justificativa: >
      Seleção e divulgação de AV referenciados (IX (b), art. 65 Res. 520).
    tags: [stablecoin, produto]
    when_true: [IX_b]
    when_false: []

  - id: cust_C_staking
    block: C
    order: 20
    type: yes_no
    text: >
      A instituição oferece staking, rendimento, travamento ou produto equivalente sobre ativos custodiados
      (direto ou com parceiro)?
    justificativa: >
      § 1º (I) (h) e art. 71 Res. 520.
    tags: [staking, rendimento]
    when_true: [par1_I_h]
    when_false: []

  - id: cust_C_if_api
    block: C
    order: 30
    type: yes_no
    text: >
      A instituição integra-se a instituições financeiras ou prestadores de pagamento via APIs/SDKs
      (on/off-ramp, Open Finance, liquidação)?
    justificativa: >
      V é obrigatório na trilha; pergunta documenta intensidade para relatório (pode não alterar conjunto).
    tags: [api, if]
    audit_only: true
    when_true: []
    when_false: []

  - id: cust_C_catalog
    block: C
    order: 40
    type: single_choice
    text: >
      Como o cliente acessa o universo de ativos virtuais que podem ser custodiados?
      (Distinto de usar internamente um ativo só para liquidação técnica sem catálogo ao cliente.)
    justificativa: >
      IX (a) quando há política de oferta/listagem/suspensão ao cliente; IX (b) acoplado a stablecoins em cust_C_stable.
    tags: [listagem, catalogo]
    options:
      - id: closed_set
        label: >
          Conjunto fechado: o cliente não escolhe entre catálogo ampliável; apenas ativos/pares definidos contratualmente.
        add_incisos: []
      - id: wide_mirror
        label: "Catálogo amplo espelhado de terceiros (subcustodiante ou parceiro), sem comitê próprio de listagem."
        add_incisos: [IX_a]
      - id: own_policy
        label: "A instituição aplica critérios próprios para admitir, suspender ou retirar ativos custodiáveis."
        add_incisos: [IX_a, IX_b]
      - id: hybrid
        label: "Híbrido: base de terceiros mais camada interna de aprovação de risco."
        add_incisos: [IX_a, IX_b]

  # ---------- Bloco D ----------
  - id: cust_D_narr
    block: D
    order: 10
    type: text_short
    text: >
      Descreva o fluxo: onboarding → depósito/guarda → autorização de movimentação → saque
      (atores, sistemas e terceiros). Opcional, recomendado para o auditor.
    justificativa: >
      Contexto qualitativo; não altera gatilhos.
    tags: [narrativa, fluxo]
    max_length: 2500
    placeholder: "Ex.: onboarding KYC; depósito para endereço nominativo; política de aprovação interna; saque para carteira do cliente…"

  - id: cust_D_attestation
    block: D
    order: 20
    type: yes_no
    text: >
      A instituição publica ou contrata auditoria/attestation de reservas (proof of reserves ou equivalente)
      além dos controlos internos mínimos?
    justificativa: >
      I_b já é obrigatório; resposta Sim reforça narrativa de comprovação explícita ao mercado.
    tags: [reservas, transparencia]
    audit_only: true
    when_true: []
    when_false: []

  - id: cust_D_surveillance
    block: D
    order: 30
    type: yes_no
    text: >
      Existem processos documentados para monitorar abusos no âmbito dos serviços oferecidos ao cliente
      (ex.: sinais de manipulação ligados a APIs ou operações assistidas)?
    justificativa: >
      XIII já é obrigatório; maturidade operacional para Jornada 2.
    tags: [mercado, surveillance]
    audit_only: true
    when_true: []
    when_false: []

  # ---------- Bloco E (custodiante — paridade de fluxo com corretora, conteúdo adaptado) ----------
  - id: cust_E_treasury_split
    block: E
    order: 10
    type: yes_no
    text: >
      Existem controlos documentados que separem claramente ativos virtuais próprios da instituição dos
      ativos virtuais de clientes (carteiras, políticas de tesouraria e de custódia), alinhados aos arts. 29–31
      da Res. 520?
    justificativa: >
      Foco modalidade custódia: segregação patrimonial e vedação do art. 31; sustenta I (a) e inciso XV na prática.
    tags: [segregacao, patrimonio, art29-31]
    audit_only: true
    when_true: []
    when_false: []

  - id: cust_E_proprietary_use_monitor
    block: E
    order: 20
    type: yes_no
    text: >
      Existe monitoramento periódico (2ª linha, risco ou auditoria) para assegurar que AV de clientes não são
      utilizados em operações próprias da instituição, salvo hipóteses expressamente admitidas na Res. 520?
    justificativa: >
      Art. 31 caput e §1º — mitigação de uso indevido de AV de titularidade de clientes.
    tags: [vedacao, art31, risco]
    audit_only: true
    when_true: []
    when_false: []

  - id: cust_E_external_custody_review
    block: E
    order: 30
    type: yes_no
    text: >
      Nos últimos dois anos, houve revisão ou auditoria independente sobre o serviço de custódia (contrato,
      política de custódia, segregação ou controlos sobre chaves), com relatório arquivado?
    justificativa: >
      Arts. 73 (X, §4º–5º), 75 e 82 — evidência de supervisão e auditoria sobre custódia.
    tags: [auditoria, custodia, art73-75]
    audit_only: true
    when_true: []
    when_false: []

  - id: cust_E_bcp_tested
    block: E
    order: 40
    type: yes_no
    text: >
      Nos últimos 24 meses, executou teste ou exercício documentado de continuidade (BCP/DR) cobrindo falha de
      subcustodiante, nuvem crítica ou indisponibilidade de instrumentos de controlo?
    justificativa: >
      IN 701 IV; Res. 520 art. 34, II e art. 43, IV e §4º; alinhado ao bloco E da trilha corretora.
    tags: [continuidade, BCP]
    audit_only: true
    when_true: []
    when_false: []

  - id: cust_E_seg_policy_patrimonial
    block: E
    order: 50
    type: yes_no
    text: >
      Existe política aprovada que descreva segregação de AV de clientes vs AV próprios, métodos de prova de
      reservas e tratamento do limite de 5% (art. 30, §2º–3º), quando aplicável?
    justificativa: >
      Arts. 29–30 Res. 520 — documentação esperada pelo supervisor e pelo certificador.
    tags: [politica, segregacao, art30]
    audit_only: true
    when_true: []
    when_false: []

  - id: cust_E_por_client_facing
    block: E
    order: 60
    type: yes_no
    text: >
      A instituição divulga ao cliente ou ao público demonstrações ou attestations de reservas / reconciliação
      com periodicidade definida?
    justificativa: >
      I (b) já obrigatório; mede maturidade de transparência além do controlo interno.
    tags: [prova_reservas, transparencia]
    audit_only: true
    when_true: []
    when_false: []

  - id: cust_E_fgc_disclosure
    block: E
    order: 70
    type: yes_no
    text: >
      Na oferta do serviço, o cliente é informado explicitamente sobre a ausência de cobertura FGC/FGCoop
      (e fundos análogos, se aplicável) para os ativos virtuais?
    justificativa: >
      Res. 520 art. 68; alinha disclosure ao § 1º (I) IN 701.
    tags: [disclosure, FGC, par1_I]
    audit_only: true
    when_true: []
    when_false: []

  - id: cust_E_position_report_contract
    block: E
    order: 80
    type: yes_no
    text: >
      O contrato de custódia regula frequência, canal e conteúdo mínimo do relatório de posição em AV (extrato),
      coerente com o art. 79 da Res. 520?
    justificativa: >
      § 1º (III) IN 701; posição tempestiva e fiel ao registo interno.
    tags: [extrato, par1_III, art79]
    audit_only: true
    when_true: []
    when_false: []

  - id: cust_E_sanctions_workflow
    block: E
    order: 90
    type: yes_no
    text: >
      O fluxo operacional inclui triagem de endereços e partes contra listas de sanções/restritivas, com registo
      de exceções?
    justificativa: >
      Art. 34, III e art. 43 §2º V — coerente com serviços relevantes e PLD.
    tags: [PLD, sancoes]
    audit_only: true
    when_true: []
    when_false: []

  - id: cust_E_pld_retention
    block: E
    order: 100
    type: yes_no
    text: >
      Registos de operações e diligências PLD são mantidos pelo prazo mínimo legal aplicável (referência:
      5 anos no art. 45, II da Res. 520, onde couber)?
    justificativa: >
      VI (a) IN 701; rastreabilidade para supervisão.
    tags: [PLD, retencao]
    audit_only: true
    when_true: []
    when_false: []

  - id: cust_E_subcustody_art74
    block: E
    order: 110
    type: yes_no
    text: >
      A instituição mantém programa documentado de supervisão de subcustodiantes (due diligence, planos,
      monitoramento contínuo e comunicação de descumprimentos ao BCB), conforme art. 74 da Res. 520?
    justificativa: >
      Substitui, na modalidade custódia, o foco corretora em contratos de liquidez/formador; núcleo art. 74.
    tags: [subcustodia, art74]
    audit_only: true
    when_true: []
    when_false: []

  - id: cust_E_stress_art82
    block: E
    order: 120
    type: yes_no
    text: >
      Foram realizados testes de stress nos últimos 12 meses (art. 82), com método e resultados documentados e
      arquivados para supervisão pelo período legal?
    justificativa: >
      Art. 82 caput e §1º–2º — capacidade dos sistemas de proteger AV custodiados.
    tags: [stress, art82, supervisao]
    audit_only: true
    when_true: []
    when_false: []

  - id: cust_E_staking_bcb_notice
    block: E
    order: 130
    type: yes_no
    text: >
      Se oferece staking a clientes (autorizado ao conjunto art. 9º, IV), foi cumprida a comunicação prévia ao
      Banco Central com a antecedência legal (art. 82, §5º da Res. 520)?
    justificativa: >
      Condicionado à operação de staking; complementa cust_C_staking ao nível de supervisão BCB.
    tags: [staking, BCB, art82-5]
    audit_only: true
    when_true: []
    when_false: []

  - id: cust_E_instruction_event_logs
    block: E
    order: 140
    type: yes_no
    text: >
      Os sistemas preservam, de forma auditável, instruções de movimentação dos clientes e registo de eventos
      incidentes sobre AV custodiados (arts. 9º, III–IV e 80), com política de retenção definida?
    justificativa: >
      Deveres operacionais do custodiante; suporte a XV e contrato tipo art. 73.
    tags: [instrucoes, eventos, art9]
    audit_only: true
    when_true: []
    when_false: []
