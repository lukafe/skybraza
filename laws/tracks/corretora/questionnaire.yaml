# Questionário — trilha CORRETORA (IN 701)
# IDs com prefixo corr_ para não colidir com a trilha intermediária no mesmo runtime (Fase 2+).
# Cada add_incisos / when_true deve existir em laws/tracks/corretora/COVERAGE_MATRIX.yaml (incisos[].id)

version: 1
track: corretora
schema_version_questionnaire: 2

blocks:
  - id: diag
    title: "Diagnóstico — serviços técnicos CertiK (Jornada 2)"
    lead: >
      Estas perguntas não alteram o escopo IN 701; preparam a Jornada 2 (smart contract audit, pentest,
      checklist de evidências). Adequado também a corretoras com contratos ou integrações on-chain.
  - id: A
    title: "Guarda, segregação e trânsito de ativos"
    lead: >
      Modelo de chaves e trânsito (corr_A_model, corr_A_transit). Se «Apenas o cliente» for coerente com trânsito «Não»
      e sem subcustódia em corr_B_tp, o motor remove VII, XIV, XVI, XVII e XV do escopo (paridade com a trilha custodiante).
  - id: B
    title: "Terceiros, infraestrutura e subcustódia"
    lead: "Nuvem, fornecedores no exterior, subcustodiantes e serviços críticos."
  - id: C
    title: "Universo de ativos, produtos e integrações"
    lead: "Listagem ao cliente, stablecoins, staking e conexões com IF/pagamentos."
  - id: D
    title: "Narrativa e transparência operacional"
    lead: "Fluxo ponta a ponta e compromissos públicos de reservas."
  - id: E
    title: "Corretora — governança, continuidade e camada de intermediação"
    lead: >
      Res. 520 art. 10 (intermediação e custódia) e art. 85 (mitigação de conflitos na cumulação).
      Perguntas de maturidade para relatório; a maioria não altera incisos (já obrigatórios na trilha).

questions:
  # ---------- Bloco diag ----------
  - id: corr_diag_sc
    block: diag
    order: 1
    type: yes_no
    text: >
      A instituição desenvolve, faz deploy ou contrata smart contracts próprios em produção
      (vaults de custódia on-chain, lógica de permissões, bridges ou protocolos sob sua responsabilidade)?
    justificativa: >
      Jornada 2 — possível trilha de smart contract audit. Não altera incisos.
    tags: [jornada2, smart_contract]
    audit_only: true
    when_true: []
    when_false: []

  - id: corr_diag_surface
    block: diag
    order: 2
    type: yes_no
    text: >
      A instituição opera sistemas próprios expostos à internet (portal de cliente, API de custódia,
      painel administrativo, webhooks) para clientes ou parceiros?
    justificativa: >
      Jornada 2 — superfície para pentest. Não altera incisos.
    tags: [jornada2, pentest]
    audit_only: true
    when_true: []
    when_false: []

  # ---------- Bloco A ----------
  - id: corr_A_transit
    block: A
    order: 10
    type: yes_no
    text: >
      Além da guarda estática, os ativos dos clientes passam por carteiras de trânsito ou omnibus
      sob controlo da instituição (ou de subcustodiante agindo em seu nome) antes do destino final?
    justificativa: >
      Reforça I_a, I_b e XV. Com corr_A_model «Apenas o cliente», corr_A_transit «Não» e sem subcustódia em corr_B_tp,
      o cluster VII/XIV/XVI/XVII e XV pode sair do escopo. «Sim» em trânsito é incompatível com «Apenas o cliente».
    tags: [transito, segregacao]
    when_true: [I_a, I_b, XV]
    when_false: []

  - id: corr_A_fiat
    block: A
    order: 20
    type: yes_no
    text: >
      A instituição mantém contas de pagamento ou saldo em moeda fiduciária (ex.: BRL) em nome do cliente
      vinculado à operação de custódia de ativos virtuais (pré-conversão, saque fiat, ou conta reserva)?
    justificativa: >
      Aciona condições dos arts. 69 e 85 da Res. 520 (inciso X (b) (ii)).
    tags: [fiat, pagamento]
    when_true: [X_b_ii]
    when_false: []

  - id: corr_A_model
    block: A
    order: 30
    type: single_choice
    text: >
      Qual modelo descreve melhor quem pode iniciar ou autorizar movimentações on-chain dos ativos custodiados
      na prática predominante?
    justificativa: >
      «Apenas o cliente» exige corr_A_transit = Não e sem «Subcustodiante» em corr_B_tp; caso contrário escolha MPC,
      subcustódia integral ou instituição operando. O motor pode retirar VII, XIV, XVI, XVII e XV só nesse conjunto
      coerente (validar modalidade Res. 520 art. 10 com jurídico).
    tags: [custodia, modelo]
    options:
      - id: client_only
        label: >
          Apenas o cliente autoriza on-chain; a instituição não detém chaves operacionais nem omnibus próprio
          (intermediação sem custódia técnica de AV, ou encaminhamento a terceiro sem controlo de chaves).
        add_incisos: []
      - id: inst_operates
        label: "A instituição ou operador designado movimenta em nome do cliente (hot, cold rotacionada, políticas internas)."
        add_incisos: []
      - id: mpc_mixed
        label: "MPC ou multipartição: a instituição e terceiros detêm fragmentos ou papéis de controlo."
        add_incisos: [II, III]
      - id: full_subcustody
        label: "Subcustódia integral por terceiro contratado (a instituição não detém chaves sozinha, mas responde perante o cliente)."
        add_incisos: [II, III]

  # ---------- Bloco B ----------
  - id: corr_B_exterior
    block: B
    order: 10
    type: yes_no
    text: >
      Fornecedores relevantes (subcustódia, nuvem, pagamentos, processamento) incluem entidade sediada no exterior
      ou sem autorização direta do Banco Central do Brasil para atividade equivalente no País?
    justificativa: >
      Terceirização com exposição internacional; arts. 32–33, 83 e continuidade (II, III, IV).
    tags: [terceiros, exterior]
    when_true: [II, III, IV]
    when_false: []

  - id: corr_B_cloud
    block: B
    order: 20
    type: yes_no
    text: >
      Ledger de saldos, cofre de chaves, HSM, ou sistemas críticos de custódia residem em nuvem ou datacenter
      de terceiro, com contrato alinhado às exigências do BCB?
    justificativa: >
      Outsourcing de tecnologia e continuidade (II, IV).
    tags: [nuvem, dados]
    when_true: [II, IV]
    when_false: []

  - id: corr_B_more_foreign
    block: B
    order: 30
    type: yes_no
    text: >
      Existem outros parceiros estrangeiros ou não autorizados pelo BCB em papéis relevantes além dos já cobertos
      (ex.: KYC como serviço crítico, mensageria de assinaturas)?
    justificativa: >
      Reforça diligência sobre prestador no exterior (art. 83) — III.
    tags: [terceiros, exterior]
    when_true: [III]
    when_false: []

  - id: corr_B_tp
    block: B
    order: 40
    type: multi_choice
    text: "Selecione terceiros materialmente relevantes na operação de custódia:"
    justificativa: >
      «Subcustodiante» com corr_A_model «Apenas o cliente» é contraditório para supressão do cluster — ajuste o modelo
      ou as opções de terceiros para refletir controlo operacional real.
    tags: [terceiros, mapa]
    options:
      - id: subcustody
        label: "Subcustodiante de criptoativos (cold, MPC, institucional)"
        add_incisos: [II, III]
      - id: cloud_infra
        label: "Nuvem / hospedagem de sistemas críticos de custódia"
        add_incisos: [II, IV]
      - id: fiat_bank
        label: "Instituição de pagamento ou banco para fiat (Pix, TED, contas)"
        add_incisos: [II, V]
      - id: kyc_vendor
        label: "Fornecedor externo de KYC / PLD como serviço crítico"
        add_incisos: [II, VI_a]

  # ---------- Bloco C ----------
  - id: corr_C_stable
    block: C
    order: 10
    type: yes_no
    text: >
      A custódia inclui ativos com paridade ou referência explícita a moeda fiduciária (stablecoins,
      tokenizado lastreado, etc.) expostos ao cliente?
    justificativa: >
      Seleção e divulgação de AV referenciados (IX (b), art. 65 Res. 520).
    tags: [stablecoin, produto]
    when_true: [IX_b]
    when_false: []

  - id: corr_C_staking
    block: C
    order: 20
    type: yes_no
    text: >
      A instituição oferece staking, rendimento, travamento ou produto equivalente sobre ativos custodiados
      (direto ou com parceiro)?
    justificativa: >
      § 1º (I) (h) e art. 71 Res. 520.
    tags: [staking, rendimento]
    when_true: [par1_I_h]
    when_false: []

  - id: corr_C_if_api
    block: C
    order: 30
    type: yes_no
    text: >
      A instituição integra-se a instituições financeiras ou prestadores de pagamento via APIs/SDKs
      (on/off-ramp, Open Finance, liquidação)?
    justificativa: >
      V já é obrigatório na trilha; «Sim» aciona o mesmo inciso por esta pergunta (paridade com P9 na intermediária).
    tags: [api, if]
    when_true: [V]
    when_false: []

  - id: corr_C_catalog
    block: C
    order: 40
    type: single_choice
    text: >
      Como o cliente acessa o universo de ativos virtuais que podem ser custodiados?
      (Distinto de usar internamente um ativo só para liquidação técnica sem catálogo ao cliente.)
    justificativa: >
      IX (a) quando há política de oferta/listagem/suspensão ao cliente; IX (b) acoplado a stablecoins em corr_C_stable.
    tags: [listagem, catalogo]
    options:
      - id: closed_set
        label: >
          Conjunto fechado: o cliente não escolhe entre catálogo ampliável; apenas ativos/pares definidos contratualmente.
        add_incisos: []
      - id: wide_mirror
        label: "Catálogo amplo espelhado de terceiros (subcustodiante ou parceiro), sem comitê próprio de listagem."
        add_incisos: [IX_a]
      - id: own_policy
        label: "A instituição aplica critérios próprios para admitir, suspender ou retirar ativos custodiáveis."
        add_incisos: [IX_a, IX_b]
      - id: hybrid
        label: "Híbrido: base de terceiros mais camada interna de aprovação de risco."
        add_incisos: [IX_a, IX_b]

  # ---------- Bloco D ----------
  - id: corr_D_narr
    block: D
    order: 10
    type: text_short
    text: >
      Descreva o fluxo: onboarding → depósito/guarda → autorização de movimentação → saque
      (atores, sistemas e terceiros). Opcional, recomendado para o auditor.
    justificativa: >
      Contexto qualitativo; não altera gatilhos.
    tags: [narrativa, fluxo]
    max_length: 2500
    placeholder: "Ex.: onboarding KYC; depósito para endereço nominativo; política de aprovação interna; saque para carteira do cliente…"

  - id: corr_D_attestation
    block: D
    order: 20
    type: yes_no
    text: >
      A instituição publica ou contrata auditoria/attestation de reservas (proof of reserves ou equivalente)
      além dos controlos internos mínimos?
    justificativa: >
      I_b já é obrigatório; resposta Sim reforça narrativa de comprovação explícita ao mercado.
    tags: [reservas, transparencia]
    audit_only: true
    when_true: []
    when_false: []

  - id: corr_D_surveillance
    block: D
    order: 30
    type: yes_no
    text: >
      Existem processos documentados para monitorar abusos no âmbito dos serviços oferecidos ao cliente
      (ex.: sinais de manipulação ligados a APIs ou operações assistidas)?
    justificativa: >
      XIII já é obrigatório; maturidade operacional para Jornada 2.
    tags: [mercado, surveillance]
    audit_only: true
    when_true: []
    when_false: []

  # ---------- Bloco E (corretora — profundidade pós-mapeamento teórico) ----------
  - id: corr_E_conflict_units
    block: E
    order: 10
    type: yes_no
    text: >
      Existem unidades ou linhas de reporte distintas entre a operação de intermediação/negociação (mesa, RFQ, OTC)
      e a operação de custódia/guarda de AV, com regras escritas para reduzir conflito de interesses (Res. 520 art. 85)?
    justificativa: >
      Art. 85, I — separação explícita entre intermediação e custódia; reforça X (a) e incisos de controlo interno.
    tags: [corretora, conflito, art85]
    audit_only: true
    when_true: []
    when_false: []

  - id: corr_E_conflict_monitor
    block: E
    order: 20
    type: yes_no
    text: >
      Existe monitoramento independente (2ª linha, compliance ou auditoria) sobre conflitos entre mesa/execução
      e custódia, com registo de achados e plano de remediação?
    justificativa: >
      Art. 85, II — monitoramento independente da conformidade operacional em conflitos potenciais.
    tags: [corretora, conflito, art85]
    audit_only: true
    when_true: []
    when_false: []

  - id: corr_E_conflict_external_review
    block: E
    order: 30
    type: yes_no
    text: >
      Nos últimos dois anos, houve revisão ou avaliação por entidade qualificada independente sobre estrutura
      e mitigação de conflitos (intermediação + custódia)?
    justificativa: >
      Art. 85, IV — verificação bienal por entidade independente (quando aplicável à operação).
    tags: [corretora, conflito, art85]
    audit_only: true
    when_true: []
    when_false: []

  - id: corr_E_bcp_tested
    block: E
    order: 40
    type: yes_no
    text: >
      Nos últimos 24 meses, a instituição executou teste ou exercício documentado de continuidade (BCP/DR)
      que cubra falha de custodiante/subcustodiante, nuvem crítica ou indisponibilidade de chaves?
    justificativa: >
      IN 701 IV; Res. 520 art. 34, II e art. 43, IV e §4º — planos de recuperação e prazos de reinício.
    tags: [continuidade, BCP]
    audit_only: true
    when_true: []
    when_false: []

  - id: corr_E_seg_policy_patrimonial
    block: E
    order: 50
    type: yes_no
    text: >
      Existe política documentada e aprovada que descreva a segregação patrimonial dos AV dos clientes face aos AV
      próprios (carteiras, omnibus, prova de reservas, exceções legais), alinhada ao Cap. IX da Res. 520?
    justificativa: >
      Arts. 29–30 Res. 520; reforça evidência para I (a) e I (b) na prática documental.
    tags: [segregacao, politica]
    audit_only: true
    when_true: []
    when_false: []

  - id: corr_E_por_client_facing
    block: E
    order: 60
    type: yes_no
    text: >
      A instituição divulga ao cliente ou ao público (site, app, relatório) demonstrações ou attestations de reservas
      / reconciliação de saldos com periodicidade definida?
    justificativa: >
      I (b) já obrigatório; documenta maturidade de transparência além do mínimo interno.
    tags: [prova_reservas, transparencia]
    audit_only: true
    when_true: []
    when_false: []

  - id: corr_E_fgc_disclosure
    block: E
    order: 70
    type: yes_no
    text: >
      Nas jornadas de oferta e contratação, o cliente é informado de forma explícita sobre a ausência de cobertura
      FGC/FGCoop (e fundos análogos, se aplicável) para os AV ofertados?
    justificativa: >
      Res. 520 art. 68; alinha disclosure ao § 1º (I) IN 701 e transparência ao investidor.
    tags: [disclosure, FGC, par1_I]
    audit_only: true
    when_true: []
    when_false: []

  - id: corr_E_position_report_contract
    block: E
    order: 80
    type: yes_no
    text: >
      O contrato ou termos regulamentam frequência, canal e conteúdo mínimo do relatório de posição em AV do cliente
      (extrato), incluindo após movimentações relevantes?
    justificativa: >
      § 1º (III) IN 701; Res. 520 art. 79 — relatório tempestivo e fiel à posição interna.
    tags: [extrato, par1_III]
    audit_only: true
    when_true: []
    when_false: []

  - id: corr_E_sanctions_workflow
    block: E
    order: 90
    type: yes_no
    text: >
      O fluxo operacional inclui triagem de endereços de carteira e partes contra listas de sanções / restritivas,
      com registo de exceções tratadas?
    justificativa: >
      Res. 520 art. 34, III e art. 43 §2º V — integração a PLD e serviços relevantes.
    tags: [PLD, sancoes, terceiros]
    audit_only: true
    when_true: []
    when_false: []

  - id: corr_E_pld_retention
    block: E
    order: 100
    type: yes_no
    text: >
      Registos de operações e diligências PLD (incl. identificação e monitoramento) são mantidos pelo prazo mínimo
      legal aplicável (referência: 5 anos na Res. 520 art. 45, II, onde couber)?
    justificativa: >
      VI (a) IN 701; prazo de guarda para supervisão e órgãos competentes.
    tags: [PLD, retencao]
    audit_only: true
    when_true: []
    when_false: []

  - id: corr_E_liquidity_provider_contract
    block: E
    order: 110
    type: yes_no
    text: >
      A instituição contrata provedor de liquidez para o ambiente de negociação (formação de preço, cotações),
      com contrato que preveja modelo de negócio, liquidação e transferência de custódia conforme Res. 520?
    justificativa: >
      Art. 38 Res. 520; documenta cadeia de intermediação além da custódia.
    tags: [intermediacao, liquidez, art38]
    audit_only: true
    when_true: []
    when_false: []

  - id: corr_E_market_maker_contract
    block: E
    order: 120
    type: yes_no
    text: >
      A instituição contrata formador de mercado para o seu book ou ambiente de negociação, com parâmetros mínimos
      de atuação contratuais (frequência, spreads, equidade entre participantes)?
    justificativa: >
      Art. 39 Res. 520; relevante para conflito e conduta de mercado (XIII, 69, 70).
    tags: [intermediacao, formador, art39]
    audit_only: true
    when_true: []
    when_false: []

  - id: corr_E_margin_product
    block: E
    order: 130
    type: yes_no
    text: >
      A instituição oferece ou planeja oferecer financiamento para compra de AV (conta margem / alavancagem ao retalho),
      sujeito a limites e elegibilidade da Res. 520 (art. 72 e vedações do art. 12)?
    justificativa: >
      Art. 72 — apenas para perfis institucionais elegíveis; documentar se o produto existe para auditor evitar incumprimento.
    tags: [margem, art72, risco]
    audit_only: true
    when_true: []
    when_false: []

  - id: corr_E_rfq_offering
    block: E
    order: 140
    type: yes_no
    text: >
      Além de livro de ordens ou matching tradicional, a instituição oferece negociação por cotação (RFQ / request for quote)
      a clientes, com disclosure das condições exigidas pela Res. 520 (art. 67, §6º)?
    justificativa: >
      Transparência de preço e contraparte na intermediação; liga a § 1º (I) e art. 67.
    tags: [RFQ, intermediacao, art67]
    audit_only: true
    when_true: []
    when_false: []
