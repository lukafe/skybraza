# Matriz de cobertura — trilha CORRETORA (IN 701 art. 4º × corpus laws/)
# Baseline conservador: mesmo pacote obrigatório que custodiante até parecer jurídico específico.
# Res. 520 art. 10: corretora tem objeto social de intermediação e custódia de AV.

meta:
  track: corretora
  schema_version_matrix: 1
  instrucao_normativa: "BCB IN 701 (certificação técnica — intermediação e custódia)"
  resolucao_principal: "Resolução BCB nº 520, de 10 de novembro de 2025"
  pasta_corpus: "laws/"
  fase: "E"
  nota_idioma: >
    O ficheiro IN701-texto-integral.txt está em português.
    Vários extratos Res520-* estão em inglês (trabalho preliminar); para produção,
    substituir por trechos oficiais em PT do site do BCB.
  nota_trilha: >
    PSVAV na modalidade corretora (Res. 520 art. 4º §1º III e art. 10: intermediação e custódia).
    Pacote obrigatório espelha a trilha custodiante nesta versão (conservador para certificação IN 701).
    III, IX_a, IX_b, X_b_ii e par1_I_h permanecem condicionais via questionnaire (laws/tracks/corretora/questionnaire.yaml).

